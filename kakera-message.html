<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>カケラTrade</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: linear-gradient(135deg,#0a0a0f,#111118 50%,#0d0d14); min-height: 100vh; font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; color: #e8e8f0; padding: 20px; }
h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 4px; }
h1 span { color: #a855f7; }
.sub { font-size: 12px; color: #555; margin-bottom: 24px; }
.section { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
.section-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.have-title { color: #22d3ee; }
.want-title { color: #f87171; }
.kakera-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.kakera-btn { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; padding: 7px 13px; cursor: pointer; color: #666; font-size: 14px; font-family: inherit; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
.kakera-btn.have-active { background: rgba(34,211,238,0.15); border-color: rgba(34,211,238,0.5); color: #22d3ee; font-weight: 700; }
.kakera-btn.want-active { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.5); color: #f87171; font-weight: 700; }
.contact-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #e8e8f0; font-size: 14px; outline: none; font-family: inherit; }
.generate-btn { width: 100%; background: linear-gradient(90deg,#a855f7,#6366f1); border: none; border-radius: 12px; padding: 14px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 16px; }
.generate-btn:disabled { background: rgba(255,255,255,0.06); color: #444; cursor: not-allowed; }
.result { background: rgba(168,85,247,0.08); border: 1px solid rgba(168,85,247,0.25); border-radius: 14px; padding: 18px; }
.result-title { font-size: 13px; color: #a78bfa; font-weight: 700; margin-bottom: 10px; }
.result-text { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 14px; font-size: 14px; line-height: 1.8; white-space: pre-wrap; word-break: break-all; color: #e8e8f0; margin-bottom: 12px; }
.copy-btn { background: rgba(168,85,247,0.2); border: 1px solid rgba(168,85,247,0.4); border-radius: 8px; padding: 9px 20px; color: #c084fc; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.copy-btn.copied { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: #4ade80; }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo { width: 32px; height: 32px; background: linear-gradient(135deg,#ff6b6b,#a855f7); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">🔀</div>
  <h1>カケラ<span>Trade</span></h1>
</div>
<p class="sub">CNP×RED° コンプリートを目指せ</p>

<div class="section">
  <div class="section-title have-title">✅ 持っているカケラ（複数選択可）</div>
  <div class="kakera-grid" id="have-grid"></div>
</div>

<div class="section">
  <div class="section-title want-title">❌ 欲しいカケラ（複数選択可）</div>
  <div class="kakera-grid" id="want-grid"></div>
</div>

<button class="generate-btn" id="gen-btn" onclick="generate()">📋 Discordメッセージを生成する</button>

<div class="result" id="result" style="display:none">
  <div class="result-title">💬 以下をコピーしてDiscordに貼り付けてください</div>
  <div class="result-text" id="result-text"></div>
  <button class="copy-btn" id="copy-btn" onclick="copyText()">📋 コピーする</button>
</div>

<script>
const KAKERA = [
  {id:1, name:"ナルカミ", emoji:"🦅"},
  {id:2, name:"ミタマ",   emoji:"👻"},
  {id:3, name:"リーリー", emoji:"🐼"},
  {id:4, name:"オロチ",   emoji:"🐍"},
  {id:5, name:"ルナ",     emoji:"🐰"},
  {id:6, name:"ヤーマ",   emoji:"👹"},
  {id:7, name:"トワ",     emoji:"🐈‍⬛"},
  {id:8, name:"セツナ",   emoji:"🐈"},
  {id:9, name:"マカミ",   emoji:"🐺"},
  {id:10,name:"エマ",     emoji:"🦄"},
  {id:11,name:"タルト",   emoji:"🐢"},
];

const have = new Set();
const want = new Set();

function renderGrid(containerId, set, activeClass) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  KAKERA.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'kakera-btn' + (set.has(k.id) ? ' ' + activeClass : '');
    btn.innerHTML = `<span>${k.emoji}</span><span>${k.name}</span>`;
    btn.onclick = () => {
      if(set.has(k.id)) set.delete(k.id);
      else set.add(k.id);
      renderGrid(containerId, set, activeClass);
      updateBtn();
    };
    container.appendChild(btn);
  });
}

function updateBtn() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = have.size === 0 && want.size === 0;
}

function generate() {
  const haveList = KAKERA.filter(k => have.has(k.id)).map(k => k.emoji + k.name).join('　');
  const wantList = KAKERA.filter(k => want.has(k.id)).map(k => k.emoji + k.name).join('　');

  let msg = '【カケラトレード募集】\n';
  if(haveList) msg += `✅ 持っているカケラ：${haveList}\n`;
  if(wantList) msg += `❌ 欲しいカケラ：${wantList}`;

  document.getElementById('result-text').textContent = msg;
  document.getElementById('result').style.display = 'block';
  document.getElementById('copy-btn').textContent = '📋 コピーする';
  document.getElementById('copy-btn').className = 'copy-btn';
}

function copyText() {
  const text = document.getElementById('result-text').textContent;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => { showCopied(); }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.opacity = '0';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  try {
    document.execCommand('copy');
    showCopied();
  } catch(e) {
    alert('テキストを長押しして手動でコピーしてください。');
  }
  document.body.removeChild(textarea);
}

function showCopied() {
  const btn = document.getElementById('copy-btn');
  btn.textContent = '✅ コピーしました！';
  btn.className = 'copy-btn copied';
}

renderGrid('have-grid', have, 'have-active');
renderGrid('want-grid', want, 'want-active');
updateBtn();
</script>
</body>
</html>
